name: Build and Deploy to GitHub Pages

# NOTE: This repo uses GitHub Pages deploy workflow (not sync-public).
# Example: dao (this repo) — builds React app and deploys to GitHub Pages
#
# Other repos use sync-public.yml for private-to-public mirroring:
# - divorce-custody-assistant (ALLOWLIST logic)
# - trading-assistant (DENYLIST logic)
# - anthropas-argus-alfred (DENYLIST logic)
# - pir-devine-news (DENYLIST logic)
# - wilson-lawn-ai-assist (DENYLIST logic)
# - trading-bot_arbitrage_DAPPUv3_hardhat_UNI-CAKE (DENYLIST logic)
#
# .nojekyll: Store in my-template repo until needed. Only add when Jekyll processing
# interferes with content (files with underscores, certain directory names, etc.).
# React/Vite sites like this one don't need it. Add on as-needed basis.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          REACT_APP_INFURA_KEY: ${{ secrets.INFURA_API_KEY }}
          CI: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
